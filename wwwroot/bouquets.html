<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buketlər - Sabina Flower Boutique</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app"></div>
  <script src="/js/i18n.js"></script>
  <script src="/js/data.js"></script>
  <script src="/js/app.js"></script>
  <script>
    function renderPage() {
      const cat = getCategoryBySlug('bouquets');
      const items = getProductsByCategory(cat.id);
      document.getElementById('app').innerHTML = `
        ${renderHeader()}
        <div class="page-section">
          <div class="container">
            <h1 class="section-title">${cat.name[currentLang]}</h1>
            <div style="width:64px;height:2px;background:var(--primary);margin:-32px auto 48px;"></div>
            <div class="products-grid">
              ${items.map(p => renderProductCard(p)).join('')}
            </div>
          </div>
        </div>
        ${renderFooter()}
      `;
      updateBadges();
    }
    renderPage();
  </script>
</body>
</html>
