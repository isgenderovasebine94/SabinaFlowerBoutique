<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabina Flower Boutique</title>
  <meta name="description" content="Sabina Flower Boutique — Bakıda premium çiçək çatdırılma xidməti">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app"></div>

  <script src="/js/i18n.js"></script>
  <script src="/js/data.js"></script>
  <script src="/js/app.js"></script>
  <script>
    function renderPage() {
      const featured = products.slice(0, 4);
      document.getElementById('app').innerHTML = `
        ${renderHeader()}
        
        <section class="hero">
          <img src="images/hero-flowers.jpg" alt="Sabina Flower Boutique" class="hero-img">
          <div class="hero-overlay"></div>
          <div class="container hero-content">
            <p class="hero-badge">🌸 Premium Flower Delivery</p>
            <h1>${t('hero.title')}</h1>
            <p>${t('hero.subtitle')}</p>
            <a href="bouquets.html" class="btn-primary">${t('hero.cta')}</a>
          </div>
        </section>

        <section class="section">
          <div class="container">
            <h2 class="section-title">${t('home.categories')}</h2>
            <div class="categories-grid">
              ${categories.map(cat => `
                <a href="${cat.slug}.html" class="category-card">
                  <img src="${cat.imageUrl}" alt="${cat.name[currentLang]}">
                  <div class="category-overlay"><h3>${cat.name[currentLang]}</h3></div>
                </a>
              `).join('')}
            </div>
          </div>
        </section>

        <section class="section section-alt">
          <div class="container">
            <h2 class="section-title">${t('home.featured')}</h2>
            <div class="products-grid">
              ${featured.map(p => renderProductCard(p)).join('')}
            </div>
          </div>
        </section>

        <section class="section">
          <div class="container">
            <h2 class="section-title">${t('home.whyUs')}</h2>
            <div class="why-grid">
              <div class="why-card">
                <div class="why-icon">${icons.flower}</div>
                <h3>${t('home.freshFlowers')}</h3>
                <p>${t('home.freshFlowersDesc')}</p>
              </div>
              <div class="why-card">
                <div class="why-icon">${icons.truck}</div>
                <h3>${t('home.freeDelivery')}</h3>
                <p>${t('home.freeDeliveryDesc')}</p>
              </div>
              <div class="why-card">
                <div class="why-icon">${icons.palette}</div>
                <h3>${t('home.uniqueDesign')}</h3>
                <p>${t('home.uniqueDesignDesc')}</p>
              </div>
            </div>
          </div>
        </section>

        ${renderFooter()}
      `;
      updateBadges();
    }
    renderPage();
  </script>
</body>
</html>
