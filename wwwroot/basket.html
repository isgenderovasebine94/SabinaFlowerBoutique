<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Səbət - Sabina Flower Boutique</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app"></div>

  <script src="/js/i18n.js"></script>
  <script src="/js/data.js"></script>
  <script src="/js/app.js"></script>
  <script>
    const API_BASE = "https://sabinaflowerboutique-production-1d17.up.railway.app";

    function renderPage() {
      const basket = getBasket();
      const items = basket.map(i => ({ ...i, product: getProductById(i.productId) })).filter(i => i.product);
      const total = items.reduce((s, i) => s + i.product.price * i.quantity, 0);

      if (items.length === 0) {
        document.getElementById('app').innerHTML = `
          ${renderHeader()}
          <div class="empty-state">
            <div class="icon">🛒</div>
            <h1>${t('basket.title')}</h1>
            <p>${t('basket.empty')}</p>
            <a href="bouquets.html" class="btn-primary">${t('basket.continueShopping')}</a>
          </div>
          ${renderFooter()}
        `;
        updateBadges(); 
        return;
      }

      document.getElementById('app').innerHTML = `
        ${renderHeader()}
        <div class="page-section">
          <div class="container" style="max-width:720px">
            <h1 class="section-title">${t('basket.title')}</h1>

            ${items.map(({ product, quantity, productId }) => `
              <div class="basket-item">
                <img src="${product.imageUrl}" alt="${product.name[currentLang]}">
                <div class="basket-item-info">
                  <h3>${product.name[currentLang]}</h3>
                  <p class="price">${product.price} ${t('currency')}</p>
                  <div class="qty-controls">
                    <button class="qty-btn" onclick="updateQuantity(${productId},${quantity-1});renderPage();">−</button>
                    <span>${quantity}</span>
                    <button class="qty-btn" onclick="updateQuantity(${productId},${quantity+1});renderPage();">+</button>
                  </div>
                </div>
                <div class="basket-item-right">
                  <button class="remove-btn" onclick="removeFromBasket(${productId});renderPage();">${icons.trash}</button>
                  <span style="font-weight:600;font-size:14px">${product.price * quantity} ${t('currency')}</span>
                </div>
              </div>
            `).join('')}

            <div class="basket-total">
              <div class="basket-total-row">
                <span>${t('basket.total')}</span>
                <span>${total} ${t('currency')}</span>
              </div>

              <!-- Müştəri formu -->
              <div class="checkout-form" style="margin-top:20px;">
                <h2>Müştəri məlumatları</h2>
                <div class="form-group">
                  <label>Ad Soyad</label>
                  <input type="text" id="customer-name" required>
                </div>
                <div class="form-group">
                  <label>Email</label>
                  <input type="email" id="customer-email" required>
                </div>
                <div class="form-group">
                  <label>Ünvan</label>
                  <input type="text" id="customer-address" required>
                </div>
                <div class="form-group">
                  <label>Telefon</label>
                  <input type="text" id="customer-phone" required>
                </div>
                <button class="btn-checkout" onclick="completeOrder()">${t('basket.checkout')}</button>
              </div>

              <div id="order-summary" style="margin-top:20px;"></div>
            </div>
          </div>
        </div>
        ${renderFooter()}
      `;
      updateBadges();
    }

    function completeOrder() {
      const basket = getBasket();
      const token = localStorage.getItem('sabina-token');

      if (!token) {
        showToast('Zəhmət olmasa əvvəl login olun');
        setTimeout(() => location.href = 'login.html', 1000);
        return;
      }

      if (basket.length === 0) {
        showToast('Səbət boşdur');
        return;
      }

      const fullName = document.getElementById('customer-name').value.trim();
      const email = document.getElementById('customer-email').value.trim();
      const address = document.getElementById('customer-address').value.trim();
      const phoneNumber = document.getElementById('customer-phone').value.trim();

      if (!fullName || !email || !address || !phoneNumber) {
        showToast('Zəhmət olmasa bütün sahələri doldurun');
        return;
      }

      fetch(API_BASE + "/api/orders", {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({
          fullName: fullName,
          email: email,
          address: address,
          phoneNumber: phoneNumber,
          items: basket.map(i => ({ productId: i.productId, quantity: i.quantity }))
        })
      })
      .then(res => res.json())
      .then(order => {
        console.log(order); 
        showToast('Sifariş uğurla göndərildi!');
        localStorage.removeItem('sabina-basket');

        const summaryDiv = document.getElementById('order-summary');
          if (summaryDiv) {
          summaryDiv.innerHTML = `
            <h3>Sifariş xülasəsi</h3>
            <p>Ad Soyad: ${order.fullName}</p>
            <p>Email: ${order.email}</p>
            <p>Ünvan: ${order.address}</p>
            <p>Telefon: ${order.phoneNumber}</p>
            <p>Ümumi Məbləğ: ${order.totalPrice} AZN</p>
          `;
        }

        setTimeout(() => location.href = 'index.html', 5000); 
      })
      .catch(err => {
        console.error(err);
        showToast('Sifariş zamanı xəta baş verdi');
      });
    }

    renderPage();
  </script>
</body>
</html>
