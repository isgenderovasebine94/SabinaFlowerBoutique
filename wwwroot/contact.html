<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Əlaqə - Sabina Flower Boutique</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app"></div>
  <script src="/js/i18n.js"></script>
  <script src="/js/data.js"></script>
  <script src="/js/app.js"></script>
  <script>
    function renderPage() {
      document.getElementById('app').innerHTML = `
        ${renderHeader()}
        <div class="page-section">
          <div class="container" style="max-width:900px">
            <h1 class="section-title">${t('contact.title')}</h1>
            <div style="width:64px;height:2px;background:var(--primary);margin:-32px auto 48px;"></div>
            <div class="contact-grid">
              <form onsubmit="event.preventDefault();showToast('Message sent!');this.reset();">
                <div class="form-group">
                  <label>${t('contact.name')}</label>
                  <input type="text" required>
                </div>
                <div class="form-group">
                  <label>${t('contact.email')}</label>
                  <input type="email" required>
                </div>
                <div class="form-group">
                  <label>${t('contact.message')}</label>
                  <textarea rows="5" required></textarea>
                </div>
                <button type="submit" class="btn-primary">${icons.send} ${t('contact.send')}</button>
              </form>
              <div>
                <div class="contact-info-card">
                  <span class="icon">📍</span>
                  <div><h3>${t('contact.address')}</h3><p>Bakı, Nəsimi rayonu, Nizami küçəsi 42</p></div>
                </div>
                <div class="contact-info-card">
                  <span class="icon">📞</span>
                  <div><h3>${t('contact.phone')}</h3><p>+994 50 123 45 67</p></div>
                </div>
                <div class="contact-info-card">
                  <span class="icon">✉️</span>
                  <div><h3>${t('contact.email')}</h3><p>info@sabinaflower.az</p></div>
                </div>
                <div class="map-embed">
                  <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3039.4!2d49.87!3d40.41!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDDCsDI0JzM2LjAiTiA0OcKwNTInMTIuMCJF!5e0!3m2!1saz!2saz!4v1" allowfullscreen loading="lazy" title="Google Map"></iframe>
                </div>
              </div>
            </div>
          </div>
        </div>
        ${renderFooter()}
      `;
      updateBadges();
    }
    renderPage();
  </script>
</body>
</html>
