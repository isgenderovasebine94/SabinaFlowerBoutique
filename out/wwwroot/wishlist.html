<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İstək Siyahısı - Sabina Flower Boutique</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app"></div>
  <script src="/js/i18n.js"></script>
  <script src="/js/data.js"></script>
  <script src="/js/app.js"></script>
  <script>
    function renderPage() {
      const wl = getWishlist();
      const items = wl.map(id => getProductById(id)).filter(Boolean);

      if (items.length === 0) {
        document.getElementById('app').innerHTML = `
          ${renderHeader()}
          <div class="empty-state">
            <div class="icon">❤️</div>
            <h1>${t('wishlist.title')}</h1>
            <p>${t('wishlist.empty')}</p>
            <a href="bouquets.html" class="btn-primary">${t('basket.continueShopping')}</a>
          </div>
          ${renderFooter()}
        `;
        updateBadges(); return;
      }

      document.getElementById('app').innerHTML = `
        ${renderHeader()}
        <div class="page-section">
          <div class="container" style="max-width:720px">
            <h1 class="section-title" style="text-align:left">${t('wishlist.title')}</h1>
            ${items.map(product => `
              <div class="wishlist-item">
                <a href="product.html?id=${product.id}"><img src="${product.imageUrl}" alt="${product.name[currentLang]}"></a>
                <div class="basket-item-info">
                  <a href="product.html?id=${product.id}"><h3>${product.name[currentLang]}</h3></a>
                  <p class="price">${product.price} ${t('currency')}</p>
                </div>
                <div class="wishlist-actions">
                  <button class="btn-move-cart" onclick="addToBasket(${product.id})" title="${t('wishlist.moveToCart')}">${icons.bag}</button>
                  <button class="btn-remove-wish" onclick="toggleWishlist(${product.id});renderPage();" title="${t('basket.remove')}">${icons.heart}</button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
        ${renderFooter()}
      `;
      updateBadges();
    }
    renderPage();
  </script>
</body>
</html>
