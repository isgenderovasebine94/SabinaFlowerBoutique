<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daxil ol - Sabina Flower Boutique</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app"></div>
  <script src="/js/i18n.js"></script>
  <script src="/js/data.js"></script>
  <script src="/js/app.js"></script>
  <script>
    let authMode = 'login';

    function renderPage() {
      document.getElementById('app').innerHTML = `
        ${renderHeader()}
        <div class="auth-container">
          <h1 class="section-title">${authMode === 'login' ? t('auth.login') : t('auth.register')}</h1>
          <div class="auth-tabs">
            <button class="auth-tab ${authMode==='login'?'active':''}" onclick="authMode='login';renderPage();">${t('auth.login')}</button>
            <button class="auth-tab ${authMode==='register'?'active':''}" onclick="authMode='register';renderPage();">${t('auth.register')}</button>
          </div>
          <form onsubmit="event.preventDefault();handleAuth();">
            ${authMode === 'register' ? `
              <div class="form-group">
                <label>${t('auth.fullName')}</label>
                <input type="text" id="auth-name" required>
              </div>
            <div class="form-group">
              <label>Ünvan</label>
              <input type="text" id="auth-address" required>
           </div>

           <div class="form-group">
             <label>Telefon</label>
             <input type="text" id="auth-phone" required>
           </div>
            ` : ''}           
            <div class="form-group">
              <label>${t('auth.email')}</label>
              <input type="email" id="auth-email" required>
            </div>
            <div class="form-group">
              <label>${t('auth.password')}</label>
              <input type="password" id="auth-password" required>
            </div>
            <button type="submit" class="btn-primary" style="width:100%;justify-content:center">
              ${authMode === 'login' ? t('auth.loginBtn') : t('auth.registerBtn')}
            </button>
          </form>
        </div>
        ${renderFooter()}
      `;
      updateBadges();
    }

    function handleAuth() {
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      const API_BASE = 'https://localhost:7268/api';

      if (authMode === 'login') {
        fetch(API_BASE + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        })
        .then(r => r.json())
        .then(data => {
          if (data.token) {
            localStorage.setItem('sabina-token', data.token);
            localStorage.setItem('sabina-user', JSON.stringify(data.user));
            showToast('Login successful!');
            setTimeout(() => location.href = 'index.html', 1000);
          } else {
            showToast('Login failed: ' + (data.message || 'Error'));
          }
        })
        .catch(() => showToast('API bağlantı xətası'));
      } else {
        const fullName = document.getElementById('auth-name').value;
        const address = document.getElementById('auth-address').value;
        const phoneNumber = document.getElementById('auth-phone').value;
        fetch(API_BASE + '/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fullName, email, password, address, phoneNumber })
        })
        .then(r => r.json())
        .then(data => {
          if (data.token) {
            localStorage.setItem('sabina-token', data.token);
            localStorage.setItem('sabina-user', JSON.stringify(data.user));
            showToast('Registration successful!');
            setTimeout(() => location.href = 'index.html', 1000);
          } else {
            showToast('Registration failed: ' + (data.message || 'Error'));
          }
        })
        .catch(() => showToast('API bağlantı xətası'));
      }
    }

    renderPage();
  </script>
</body>
</html>
